<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="TIP Logo">
  <rect width="128" height="128" fill="#ffffff"/>

  <!-- top yellow band -->
  <rect x="8" y="6" width="112" height="8" fill="#f5c400"/>

  <!-- gray logo body -->
  <rect x="8" y="14" width="112" height="72" fill="#d4d4d4"/>
  <rect x="8" y="46" width="18" height="40" fill="#b4b4b4"/>
  <rect x="102" y="46" width="18" height="40" fill="#b4b4b4"/>

  <!-- TIP letters -->
  <text x="64" y="66" text-anchor="middle" fill="#111111"
    font-size="52" font-family="Arial Black, Arial, sans-serif" font-weight="900">T.I.P</text>

  <!-- white dots under letters -->
  <circle cx="44" cy="74" r="4.5" fill="#f3f3f3" stroke="#8b8b8b" stroke-width="0.8"/>
  <circle cx="64" cy="74" r="4.5" fill="#f3f3f3" stroke="#8b8b8b" stroke-width="0.8"/>
  <circle cx="84" cy="74" r="4.5" fill="#f3f3f3" stroke="#8b8b8b" stroke-width="0.8"/>

  <!-- bottom black panel -->
  <rect x="8" y="84" width="112" height="34" fill="#111111"/>

  <!-- bottom label lines -->
  <text x="64" y="99" text-anchor="middle" fill="#f5c400"
    font-size="8" font-family="Arial Black, Arial, sans-serif" font-weight="700">TECHNOLOGICAL INSTITUTE</text>
  <text x="64" y="109" text-anchor="middle" fill="#f5c400"
    font-size="8" font-family="Arial Black, Arial, sans-serif" font-weight="700">OF THE PHILIPPINES</text>
</svg>
