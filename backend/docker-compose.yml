version: '3.8'
services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: NewScholarSphere
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  api:
    build: .
    command: sh -c "gunicorn app.main:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 --workers ${GUNICORN_WORKERS:-2} --timeout ${GUNICORN_TIMEOUT:-120}"
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql://postgres:admin123@db:5432/NewScholarSphere
      CORS_ALLOW_ORIGINS: "http://localhost:5175,https://firmamental-unicameral-kane.ngrok-free.dev"
      DB_AUTO_CREATE: "false"
      GUNICORN_WORKERS: "2"
      GUNICORN_TIMEOUT: "120"
    ports:
      - "8000:8000"
    depends_on:
      - db
volumes:
  pgdata:
